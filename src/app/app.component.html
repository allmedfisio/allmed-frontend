<ion-app>
  <ion-menu side="start" menuId="segreteria-menu" contentId="main-content">
    <ion-content>
      <ion-list lines="none">
        <ion-item button (click)="openAddPatientModal()">
          <ion-icon
            slot="start"
            name="person-add-outline"
            class="icon"
          ></ion-icon>
          <ion-label class="section-title">Nuovo Paziente</ion-label>
        </ion-item>
        <ion-item button (click)="openAddDoctorModal()">
          <ion-icon
            slot="start"
            name="person-add-outline"
            class="icon"
          ></ion-icon>
          <ion-label class="section-title">Nuovo Medico</ion-label>
        </ion-item>
        <ion-menu-toggle auto-hide="false">
          <ion-item routerLink="/ticket-config" detail="false">
            <ion-icon
              slot="start"
              name="document-text-outline"
              class="icon"
            ></ion-icon>
            <ion-label class="section-title">Modifica Ticket</ion-label>
          </ion-item>
        </ion-menu-toggle>
        <ion-menu-toggle auto-hide="false">
          <ion-item routerLink="/follow-up" detail="false">
            <ion-icon slot="start" name="call-outline" class="icon"></ion-icon>
            <ion-label class="section-title">Follow-up</ion-label>
            <ion-badge
              slot="end"
              color="secondary"
              *ngIf="followUpCount$ | async as count"
              [hidden]="count === 0"
            >
              {{ count }}
            </ion-badge>
          </ion-item>
        </ion-menu-toggle>
        <ion-menu-toggle auto-hide="false">
          <ion-item routerLink="/calcolo-compensi" detail="false">
            <ion-icon
              slot="start"
              name="calculator-outline"
              class="icon"
            ></ion-icon>
            <ion-label class="section-title">Calcolo Compensi</ion-label>
          </ion-item>
        </ion-menu-toggle>
        <ion-menu-toggle auto-hide="false" *ngIf="isAdmin$ | async">
          <ion-item routerLink="/business-analytics" detail="false">
            <ion-icon
              slot="start"
              name="stats-chart-outline"
              class="icon"
            ></ion-icon>
            <ion-label class="section-title">Analisi Aziendale</ion-label>
          </ion-item>
        </ion-menu-toggle>
      </ion-list>
    </ion-content>
  </ion-menu>
  <ion-router-outlet id="main-content"></ion-router-outlet>
</ion-app>
